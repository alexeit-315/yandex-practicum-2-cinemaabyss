server:
  port: 8082
  servlet:
    context-path: /

spring:
  kafka:
    bootstrap-servers: cinemaabyss-kafka:9092
    consumer:
      group-id: events-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.events.models"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

resilience:
  retry:
    max-attempts: 3
    backoff-delay: 100

logging:
  level:
    root: INFO
    com.example.events: DEBUG
    com.example.events.controllers: DEBUG
    com.example.events.services: DEBUG
  file:
    name: C:/Tmp/events-service.log
